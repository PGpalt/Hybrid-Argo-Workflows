apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: slurm-template
spec:
  entrypoint: slurm-submit-job
  templates:
    - name: slurm-submit-job
      metadata:
        labels:
          katib.kubeflow.org/model-training: "true"
      inputs:
        parameters:
          - name: command
          - name: s3artifact
            default: "NotSet"
          - name: slurmInput
            default: "false"
          - name: fetchData
            default: "false"
          - name: outputFileName
            default: "NotSet"
          - name: outputFilePath
            default: "default"
        artifacts:
          - name: input-artifact
            path: /tmp/
            optional: true
            s3:
              key: "{{inputs.parameters.s3artifact}}"
      outputs:
        artifacts:
          - name: output-artifact
            path: "{{inputs.parameters.outputFilePath}}/"
            optional: true
            s3:
              key: "{{workflow.uid}}/{{pod.name}}"
            archive:
              none: {}
      container:
        env:
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: COMMAND
            value: "{{inputs.parameters.command}}"
          - name: TRANSFER_DATA
            value: "{{inputs.parameters.s3artifact}}"
          - name: FILE_NAME
            value: "{{inputs.parameters.outputFileName}}"
          - name: FILE_PATH
            value: "{{inputs.parameters.outputFilePath}}"
          - name: SLURM_INPUT
            value: "{{inputs.parameters.slurmInput}}"
          - name: FETCH_DATA
            value: "{{inputs.parameters.fetchData}}"
        image: my-ssh-client:latest
        imagePullPolicy: IfNotPresent
        command: ["/usr/local/bin/trigger-job.sh"]
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
