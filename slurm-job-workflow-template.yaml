apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: ssh-client-template
spec:
  entrypoint: ssh-client
  templates:
  - name: ssh-client
    metadata:
      labels:
        katib.kubeflow.org/model-training: "true"
    inputs:
      parameters:
      - name: command        # e.g., "sbatch"
      - name: scriptName     # e.g., "my_script.slurm"
      - name: minioEndpoint  # e.g., "minio.minio-dev.svc.cluster.local:9000"
      - name: bucket         # e.g., "slurm-script"
    script:
      env:
      - name: POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name
      name: model-training
      image: my-ssh-client:latest
      imagePullPolicy: IfNotPresent
      command: [bash]
      source: |
        #!/bin/bash
        # Extract the suffix from POD_NAME
        SUFFIX=${POD_NAME##*-}
        echo "Pod suffix: ${SUFFIX}"
        
        # Create a directory for the SLURM job on the remote host using the suffix
        sshpass -p 'root' ssh -o StrictHostKeyChecking=no -p 2222 root@host.minikube.internal "mkdir -p slurm-job-${SUFFIX}"
        
        # Download the file from MinIO locally in the pod
        curl -o /tmp/{{inputs.parameters.scriptName}} http://{{inputs.parameters.minioEndpoint}}/{{inputs.parameters.bucket}}/{{inputs.parameters.scriptName}}
        
        # Transfer the file to the remote SLURM machine via SCP
        sshpass -p 'root' scp -o StrictHostKeyChecking=no -P 2222 /tmp/{{inputs.parameters.scriptName}} root@host.minikube.internal:/root/slurm-job-${SUFFIX}/{{inputs.parameters.scriptName}}
        
        # Run the SLURM command on the remote machine, using the transferred file
        sshpass -p 'root' ssh -o StrictHostKeyChecking=no -p 2222 root@host.minikube.internal "cd slurm-job-${SUFFIX} && {{inputs.parameters.command}}"
      resources:
        requests:
          memory: "128Mi"
          cpu: "100m"
        limits:
          memory: "256Mi"
          cpu: "500m"
