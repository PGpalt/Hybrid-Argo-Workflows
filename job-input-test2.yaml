jobs:
  - name: gen-epochs
    type: k8s
    jobSpec:
      script:
        image: python:alpine3.6
        command:
          - python
        source: |
          import random
          print(60000//random.randint(10000, 40000))

  - name: model-training
    type: slurm
    # command: "export LR=${trialParameters.learningRate} && export epochs={{tasks.gen-epochs.outputs.result}} && sbatch katib-train.slurm"
    command: "export LR=0.017 && export epochs={{tasks.gen-epochs.outputs.result}} && sbatch katib-train.slurm"
    inputs:
      - s3key: Mnist-Dataset
      - from: gen-epochs
    outputs:
      - name: outputFileName
        value: mnist.log
      - name: outputFilePath
        value: slurm-out

  - name: print-message-from-slurm-output
    type: k8s
    jobSpec:
      inputs:
        artifacts:
        # unpack the message input artifact
        # and put it at /tmp/message
        - name: logs
          path: "/tmp/logs"
      metadata:
        labels:
          katib.kubeflow.org/model-training: "true"
      container:
        image: alpine:latest
        command: [sh, -c]
        # args: ["sleep 5;ls -l /tmp/logs;cp /tmp/logs/mnist.log /katib/mnist.log"]
        args: [cat /tmp/logs/mnist.log]
    inputs:
      - name: logs
        from: model-training         