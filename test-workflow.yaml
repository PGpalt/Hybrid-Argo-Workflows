apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: workflow-using-template-
spec:
  entrypoint: run-ssh-command
  templates:
  - name: run-ssh-command
    steps:
      - - name: execute-ssh
          templateRef:
            name: ssh-client-template
            template: ssh-client
          arguments:
            parameters:
              - name: command
                value: "sbatch"
              - name: scriptName
                value: "slurm_train.slurm"
              - name: minioEndpoint
                value: "minio.minio-dev.svc.cluster.local:9000"
              - name: bucket
                value: "slurm-script"
