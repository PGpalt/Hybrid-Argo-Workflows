apiVersion: "kubeflow.org/v1beta1"
kind: Experiment
metadata:
  namespace: argo
  name: katib-argo-workflow
spec:
  objective:
    type: minimize
    goal: 0.001
    objectiveMetricName: loss
  algorithm:
    algorithmName: random
  parallelTrialCount: 2
  maxTrialCount: 5
  maxFailedTrialCount: 1
  parameters:
    - name: lr
      parameterType: double
      feasibleSpace:
        min: "0.01"
        max: "0.03"
    - name: batch_size
      parameterType: int
      feasibleSpace:
        min: "32"
        max: "64"
    - name: epochs
      parameterType: int
      feasibleSpace:
        min: "1"
        max: "2"
  trialTemplate:
    retain: true
    primaryPodLabels:
      katib.kubeflow.org/model-training: "true"
    primaryContainerName: main
    successCondition: status.[@this].#(phase=="Succeeded")#
    failureCondition: status.[@this].#(phase=="Failed")#
    trialParameters:
      - name: learningRate
        description: Learning rate for the training model
        reference: lr
      - name: batchSize
        description: Batch size for the training job
        reference: batch_size
      - name: epochs
        description: Number of epochs for the training job
        reference: epochs
    trialSpec:
      apiVersion: argoproj.io/v1alpha1
      kind: Workflow
      spec:
        entrypoint: run-ssh-command
        templates:
          - name: run-ssh-command
            steps:
              - - name: execute-ssh
                  templateRef:
                    name: ssh-client-template
                    template: ssh-client
                  arguments:
                    parameters:
                      - name: command
                        value: "sbatch"
                      - name: scriptName
                        value: "katib-train.slurm"
                      - name: minioEndpoint
                        value: "minio.minio-dev.svc.cluster.local:9000"
                      - name: bucket
                        value: "slurm-script"
                      - name: learnRate
                        value: "{{trialParameters.learningRate}}"
                      - name: batchSize
                        value: "{{trialParameters.batchSize}}"
                      - name: epochs
                        value: "{{trialParameters.epochs}}"
