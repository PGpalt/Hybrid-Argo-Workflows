---
# This example shows how you can use Argo Workflows in Katib, transfer parameters from one Step to another and run HP job.
# It uses a simple random algorithm and tunes only learning rate.
# Workflow contains 2 Steps, first is data-preprocessing second is model-training.
# First Step shows how you can prepare your training data (here: simply divide number of training examples) before running HP job.
# Number of training examples is transferred to the second Step.
# Second Step is the actual training which metrics collector sidecar is injected.
# Note that for this example Argo Container Runtime Executor must be "emissary".
apiVersion: kubeflow.org/v1beta1
kind: Experiment
metadata:
  namespace: argo
  name: katib-argo-workflow
spec:
  objective:
    type: minimize
    goal: 0.05
    objectiveMetricName: loss
  metricsCollectorSpec:
    source:
      filter:
        metricsFormat:
          - "{metricName: ([\\w|-]+), metricValue: ((-?\\d+)(\\.\\d+)?)}"
      fileSystemPath:
        path: "/katib/mnist.log"
        kind: File
    collector:
      kind: File
  algorithm:
    algorithmName: random
  parallelTrialCount: 2
  maxTrialCount: 5
  maxFailedTrialCount: 1
  parameters:
    - name: lr
      parameterType: double
      feasibleSpace:
        min: "0.01"
        max: "0.03"
  trialTemplate:
    retain: true
    primaryPodLabels:
      katib.kubeflow.org/model-training: "true"
    primaryContainerName: main
    successCondition: status.[@this].#(phase=="Succeeded")#
    failureCondition: status.[@this].#(phase=="Failed")#
    trialParameters:
      - name: learningRate
        description: Learning rate for the training model
        reference: lr
    trialSpec:
      apiVersion: argoproj.io/v1alpha1
      kind: Workflow
      metadata:
        generateName: hybrid-workflow-
      spec:
        entrypoint: hybrid-workflow
        templates:
        - dag:
            tasks:
            - name: gen-epochs
              template: gen-epochs-template
            - arguments:
                parameters:
                - name: command
                  value: export LR=${trialParameters.learningRate} && export epochs={{tasks.gen-epochs.outputs.result}}
                    && sbatch katib-train.slurm
                - name: outputFileName
                  value: mnist.log
                - name: fetchData
                  value: 'true'
                - name: s3artifact
                  value: Mnist-Dataset
              dependencies:
              - gen-epochs
              name: model-training
              templateRef:
                clusterScope: true
                name: slurm-template
                template: slurm-submit-job
            - arguments:
                artifacts:
                - from: '{{tasks.model-training.outputs.artifacts.output-artifact}}'
                  name: logs
              dependencies:
              - model-training
              name: print-message-from-slurm-output
              template: print-message-from-slurm-output-template
          name: hybrid-workflow
        - name: gen-epochs-template
          script:
            command:
            - python
            image: python:alpine3.6
            source: 'import random

              print(60000//random.randint(40000, 40000))

              '
        - container:
            args:
            - sleep 10;cp /tmp/logs/mnist.log /katib/mnist.log;cat /katib/mnist.log
            command:
            - sh
            - -c
            image: busybox:latest
          inputs:
            artifacts:
            - name: logs
              path: /tmp/logs
          metadata:
            labels:
              katib.kubeflow.org/model-training: 'true'
          name: print-message-from-slurm-output-template
