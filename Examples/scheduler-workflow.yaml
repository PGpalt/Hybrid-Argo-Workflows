apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  annotations:
    scheduler/global-parallelism: '5'
  generateName: hybrid-workflow-
spec:
  entrypoint: hybrid-workflow
  parallelism: 5
  templates:
  - dag:
      tasks:
      - name: fastp-trimming
        template: fastp-trimming-template
      - arguments:
          parameters:
          - name: command
            value: ls
          - name: s3artifact
            value: GenomicDataAris
        dependencies:
        - fastp-trimming
        name: ARIS-Input-Stage
        templateRef:
          clusterScope: true
          name: slurm-template
          template: slurm-submit-job
      - arguments:
          artifacts:
          - from: '{{tasks.ARIS-Input-Stage.outputs.artifacts.output-artifact}}'
            name: input-artifact
          parameters:
          - name: command
            value: export DATAPATH='E-Coli' && sbatch QC-Alignment-local.slurm
          - name: fetchData
            value: true
          - name: outputFileName
            value: E-Coli/alignment_summary.txt
          - name: cleanDataPath
            value: E-Coli
          - name: slurmInput
            value: 'true'
          - name: cleanData
            value: 'true'
        dependencies:
        - ARIS-Input-Stage
        name: Alignment1
        templateRef:
          clusterScope: true
          name: slurm-template
          template: slurm-submit-job
      - arguments:
          artifacts:
          - from: '{{tasks.ARIS-Input-Stage.outputs.artifacts.output-artifact}}'
            name: input-artifact
          parameters:
          - name: command
            value: export DATAPATH='Salmonella-Enterica' && sbatch QC-Alignment-local.slurm
          - name: fetchData
            value: true
          - name: outputFileName
            value: Salmonella-Enterica/alignment_summary.txt
          - name: cleanDataPath
            value: Salmonella-Enterica
          - name: slurmInput
            value: 'true'
          - name: cleanData
            value: 'true'
        dependencies:
        - ARIS-Input-Stage
        name: Alignment2
        templateRef:
          clusterScope: true
          name: slurm-template
          template: slurm-submit-job
      - arguments:
          artifacts:
          - from: '{{tasks.ARIS-Input-Stage.outputs.artifacts.output-artifact}}'
            name: input-artifact
          parameters:
          - name: command
            value: export DATAPATH='Shigella' && sbatch QC-Alignment-local.slurm
          - name: fetchData
            value: true
          - name: outputFileName
            value: Shigella/alignment_summary.txt
          - name: cleanDataPath
            value: Shigella
          - name: slurmInput
            value: 'true'
          - name: cleanData
            value: 'true'
        dependencies:
        - ARIS-Input-Stage
        - Alignment1
        name: Alignment3
        templateRef:
          clusterScope: true
          name: slurm-template
          template: slurm-submit-job
    name: hybrid-workflow
  - container:
      args:
      - "mkdir -p /out && \\\nfastp \\\n  -i /data/sample_R1.fastq.gz \\\n  -I /data/sample_R2.fastq.gz\
        \ \\\n  -o /out/sample_R1.trimmed.fastq.gz \\\n  -O /out/sample_R2.trimmed.fastq.gz\
        \ \\\n  -h /out/trim_report.html\n"
      command:
      - sh
      - -c
      image: quay.io/biocontainers/fastp:0.23.1--h79da9fb_0
    inputs:
      artifacts:
      - archive:
          none: {}
        name: inputArtifact
        path: /data
        s3:
          key: GenomicData
    name: fastp-trimming-template
    outputs:
      artifacts:
      - archive:
          none: {}
        name: outputArtifact
        path: /out
        s3:
          key: GenomicDataAris
