apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  annotations:
    scheduler/global-parallelism: '5'
  generateName: hybrid-workflow-
spec:
  entrypoint: hybrid-workflow
  parallelism: 5
  templates:
  - dag:
      tasks:
      - name: gen-epochs
        template: gen-epochs-template
      - arguments:
          parameters:
          - name: command
            value: export LR=0.017 && export epochs={{tasks.gen-epochs.outputs.result}}
              && sbatch katib-train-local.slurm
          - name: outputFileName
            value: mnist.log
          - name: s3artifact
            value: Mnist-Dataset
        dependencies:
        - gen-epochs
        name: model-training
        templateRef:
          clusterScope: true
          name: slurm-template
          template: slurm-submit-job
      - arguments:
          parameters:
          - name: command
            value: export LR=0.017 && export epochs={{tasks.gen-epochs.outputs.result}}
              && sbatch katib-train-local.slurm
          - name: outputFileName
            value: mnist.log
          - name: s3artifact
            value: Mnist-Dataset
        dependencies:
        - gen-epochs
        name: model-training2
        templateRef:
          clusterScope: true
          name: slurm-template
          template: slurm-submit-job
      - arguments:
          parameters:
          - name: command
            value: export LR=0.017 && export epochs={{tasks.gen-epochs.outputs.result}}
              && sbatch katib-train-local.slurm
          - name: outputFileName
            value: mnist.log
          - name: s3artifact
            value: Mnist-Dataset
        dependencies:
        - gen-epochs
        - model-training
        name: model-training3
        templateRef:
          clusterScope: true
          name: slurm-template
          template: slurm-submit-job
      - arguments:
          parameters:
          - name: command
            value: export LR=0.017 && export epochs={{tasks.gen-epochs.outputs.result}}
              && sbatch katib-train-local.slurm
          - name: outputFileName
            value: mnist.log
          - name: s3artifact
            value: Mnist-Dataset
        dependencies:
        - gen-epochs
        - model-training2
        name: model-training4
        templateRef:
          clusterScope: true
          name: slurm-template
          template: slurm-submit-job
    name: hybrid-workflow
  - name: gen-epochs-template
    script:
      command:
      - python
      image: python:alpine3.6
      source: "import random\nprint(60000//random.randint(40000, 40000))     \n"
